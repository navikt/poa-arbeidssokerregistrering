version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    # Look for `package.json` and `lock` files in the `root` directory
    directory: "/"
    # Check the npm registry for updates once a week
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      aksel:
        patterns:
          - "@navikt/aksel-*"
          - "@navikt/ds-*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      pino:
        patterns:
          - "pino"
          - "pino-pretty"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "msw-storybook-addon"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"